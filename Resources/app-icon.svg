<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 品牌色对角渐变（#4E5BD6 -> #7979FF），跟 W1 后 Theme.brand 一致 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4E5BD6"/>
      <stop offset="100%" stop-color="#7979FF"/>
    </linearGradient>
  </defs>

  <!-- squircle 圆角背景（rx 224 ≈ 22%，匹配 macOS Tahoe 大圆角 squircle） -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- 三柱几何中心（整体在画布居中），底部对齐 baseline=640 -->
  <g transform="translate(512 0)">
    <!-- 三柱 (60 宽, 18 圆角, 高度递增 180 / 260 / 380)：克制版 -->
    <!-- 左柱: 输入 input（最矮，0.82 透明度） -->
    <rect x="-205" y="460" width="60" height="180" rx="18" fill="#FFFFFF" opacity="0.82"/>
    <!-- 中柱: 缓存 cache（中等，0.92 透明度） -->
    <rect x="-65"  y="380" width="60" height="260" rx="18" fill="#FFFFFF" opacity="0.92"/>
    <!-- 右柱: 输出 output（最高，1.0 透明度） -->
    <rect x="75"   y="260" width="60" height="380" rx="18" fill="#FFFFFF" opacity="1"/>

    <!-- 底部 baseline：测量锚点，与菜单栏 icon 三柱+baseline 同语言 -->
    <rect x="-240" y="640" width="480" height="14" rx="7" fill="#FFFFFF" opacity="0.55"/>
  </g>
</svg>
